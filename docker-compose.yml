version: '3.8'

services:
  realsense_ros2:
    build:
      context: .
      dockerfile: Dockerfile${DOCKERFILE_EXT:-}
    image: ek_tag_detection-realsense_ros2${DOCKERFILE_EXT:-}
    container_name: ek_tag_detection_container
    network_mode: "host"
    privileged: true
    pid: "host"
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=55
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - .:/workspace/camera_runner
      - ../barcode_perception:/workspace/barcode_perception
      - ../data:/workspace/data
      - /dev:/dev:rshared
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: /bin/bash -c "sleep infinity"
